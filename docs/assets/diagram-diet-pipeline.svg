<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 280" width="1300" height="280">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
    .title { font-size: 23px; font-weight: 700; fill: #111827; }
    .node { font-size: 14px; font-weight: 700; fill: #111827; }
    .sub  { font-size: 11.5px; fill: #6b7280; }
    .lbl  { font-size: 12px; font-weight: 600; fill: #2563eb; }
  </style>
  <defs>
    <marker id="p-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <filter id="s3" x="-6%" y="-6%" width="112%" height="112%"><feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="1300" height="280" fill="#ffffff"/>
  <text x="650" y="48" text-anchor="middle" class="title">Diet Recognition Pipeline</text>

  <!-- 1. 사진 -->
  <rect x="30" y="96" width="190" height="104" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s3)"/>
  <text x="125" y="140" text-anchor="middle" class="node">사진 업로드</text>
  <text x="125" y="164" text-anchor="middle" class="sub">음식 사진 1장</text>

  <!-- 2. VLM -->
  <rect x="290" y="96" width="190" height="104" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5" filter="url(#s3)"/>
  <text x="385" y="140" text-anchor="middle" class="node">식단 인식 (VLM)</text>
  <text x="385" y="164" text-anchor="middle" class="sub">음식 &#183; 추정 섭취량</text>

  <!-- 3. Public DB match (key step) -->
  <rect x="550" y="90" width="190" height="116" rx="10" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="2" filter="url(#s3)"/>
  <text x="645" y="132" text-anchor="middle" class="node">공공 영양 DB 매칭</text>
  <text x="645" y="155" text-anchor="middle" class="sub">나트륨&#183;칼로리&#183;당 보정</text>
  <text x="645" y="174" text-anchor="middle" class="sub" style="fill:#0d9488;font-weight:600">AI 추정 → 검증 수치</text>

  <!-- 4. Store -->
  <rect x="810" y="96" width="190" height="104" rx="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#s3)"/>
  <text x="905" y="140" text-anchor="middle" class="node">구조화 기록 저장</text>
  <text x="905" y="164" text-anchor="middle" class="sub">회원별 &#183; 날짜별</text>

  <!-- 5. Trainer report -->
  <rect x="1070" y="96" width="190" height="104" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#s3)"/>
  <text x="1165" y="140" text-anchor="middle" class="node">트레이너 리포트</text>
  <text x="1165" y="164" text-anchor="middle" class="sub">데이터 기반 코칭</text>

  <!-- arrows (긴 간격: 라벨이 박스와 겹치지 않음) -->
  <line x1="222" y1="148" x2="288" y2="148" stroke="#2563eb" stroke-width="2" marker-end="url(#p-b)"/>
  <rect x="228" y="126" width="54" height="18" rx="4" fill="#ffffff"/>
  <text x="255" y="139" text-anchor="middle" class="lbl">이미지</text>

  <line x1="482" y1="148" x2="548" y2="148" stroke="#2563eb" stroke-width="2" marker-end="url(#p-b)"/>
  <rect x="484" y="126" width="62" height="18" rx="4" fill="#ffffff"/>
  <text x="515" y="139" text-anchor="middle" class="lbl">인식 결과</text>

  <line x1="742" y1="148" x2="808" y2="148" stroke="#2563eb" stroke-width="2" marker-end="url(#p-b)"/>
  <rect x="744" y="126" width="62" height="18" rx="4" fill="#ffffff"/>
  <text x="775" y="139" text-anchor="middle" class="lbl">보정 수치</text>

  <line x1="1002" y1="148" x2="1068" y2="148" stroke="#2563eb" stroke-width="2" marker-end="url(#p-b)"/>
  <rect x="1004" y="126" width="62" height="18" rx="4" fill="#ffffff"/>
  <text x="1035" y="139" text-anchor="middle" class="lbl">일별 집계</text>
</svg>
