# Alembic 설정 — On-Care 백엔드
# DB URL 은 여기 하드코딩하지 않고 migrations/env.py 에서 app 설정(.env 의 DATABASE_URL)을 읽습니다.
[alembic]
script_location = migrations
prepend_sys_path = .
# 리비전 파일명: 0001_slug 형태
file_template = %%(rev)s_%%(slug)s
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
