<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" width="960" height="430">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
    .title { font-size: 23px; font-weight: 700; fill: #111827; }
    .node-t { font-size: 17px; font-weight: 700; fill: #111827; }
    .node-s { font-size: 12.5px; fill: #6b7280; }
    .lbl { font-size: 12.5px; font-weight: 600; fill: #374151; }
    .leg { font-size: 12px; fill: #6b7280; }
  </style>
  <defs>
    <marker id="a-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="a-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="a-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/></marker>
    <filter id="soft" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="960" height="430" fill="#ffffff"/>
  <text x="480" y="46" text-anchor="middle" class="title">Service Data Flow</text>

  <!-- Member -->
  <rect x="70" y="130" width="215" height="120" rx="12" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5" filter="url(#soft)"/>
  <text x="177" y="182" text-anchor="middle" class="node-t">회원</text>
  <text x="177" y="210" text-anchor="middle" class="node-s">식단 사진 &#183; 간단 입력</text>

  <!-- On-Care hub -->
  <rect x="372" y="122" width="216" height="136" rx="12" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.8" filter="url(#soft)"/>
  <text x="480" y="178" text-anchor="middle" class="node-t">On-Care</text>
  <text x="480" y="205" text-anchor="middle" class="node-s">AI 자동 인식 &#183; 정리</text>
  <text x="480" y="226" text-anchor="middle" class="node-s">회원별 &#183; 날짜별 리포트</text>

  <!-- Trainer -->
  <rect x="675" y="130" width="215" height="120" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#soft)"/>
  <text x="782" y="182" text-anchor="middle" class="node-t">트레이너</text>
  <text x="782" y="210" text-anchor="middle" class="node-s">세션 &#183; 프로그램 기록</text>

  <!-- Member -> On-Care -->
  <line x1="285" y1="190" x2="368" y2="190" stroke="#2563eb" stroke-width="2" marker-end="url(#a-blue)"/>
  <rect x="288" y="163" width="78" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="327" y="177" text-anchor="middle" class="lbl">식단&#183;운동 기록</text>

  <!-- On-Care -> Trainer -->
  <line x1="588" y1="190" x2="671" y2="190" stroke="#16a34a" stroke-width="2" marker-end="url(#a-green)"/>
  <rect x="596" y="163" width="66" height="20" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="629" y="177" text-anchor="middle" class="lbl">요약 리포트</text>

  <!-- Trainer -> Member (coaching loop) -->
  <path d="M782 250 L782 338 Q782 352 768 352 L191 352 Q177 352 177 338 L177 250" fill="none" stroke="#9333ea" stroke-width="2" marker-end="url(#a-purple)"/>
  <rect x="398" y="342" width="164" height="21" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="480" y="357" text-anchor="middle" class="lbl" style="fill:#7c3aed">데이터 기반 맞춤 코칭</text>

  <!-- legend -->
  <g transform="translate(72,392)">
    <line x1="0" y1="7" x2="26" y2="7" stroke="#2563eb" stroke-width="2" marker-end="url(#a-blue)"/>
    <text x="32" y="11" class="leg">기록 수집</text>
    <line x1="150" y1="7" x2="176" y2="7" stroke="#16a34a" stroke-width="2" marker-end="url(#a-green)"/>
    <text x="182" y="11" class="leg">트레이너 전달</text>
    <line x1="320" y1="7" x2="346" y2="7" stroke="#9333ea" stroke-width="2" marker-end="url(#a-purple)"/>
    <text x="352" y="11" class="leg">맞춤 코칭 피드백</text>
  </g>
</svg>
