name: oncare_trainer
description: "On-Care 트레이너 앱 — 트레이너용 고객 관리 / AI 루틴 / 스케줄 (Android / iOS / Web)."
publish_to: 'none'

# Versioning is managed via --build-name / --build-number at build time.
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- State management & DI ---
  # 사용자 앱(frontend/flutter)과 동일한 Riverpod 기반. 트레이너 앱은
  # 별도 프로젝트이므로 코드는 공유하지 않고 스택만 맞춘다.
  flutter_riverpod: ^2.6.1

  # --- Routing ---
  go_router: ^14.6.2

  # --- Local persistence ---
  # 세션 토큰(현재는 mock 데모 토큰)을 저장해 앱 재시작 시 세션을 복원한다.
  # 실 백엔드 연동 시 secure storage 로 교체하기 쉽도록 SessionTokenStore
  # 뒤에 감춰둔다.
  shared_preferences: ^2.3.2

  # drift(SQLite) 로컬 백엔드 — 백엔드 미연결 동안 고객/스케줄 등 mock
  # 데이터를 영속 저장한다 (사용자 앱과 동일 스택, 코드는 공유하지 않음).
  drift: ^2.20.3
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 런처/파비콘 아이콘을 온케어 로고에서 생성 (dart run flutter_launcher_icons).
  flutter_launcher_icons: ^0.14.1

  # --- Codegen (drift) ---
  build_runner: ^2.4.13
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# 런처 아이콘 생성 설정 — 소스는 온케어 로고(500x500 RGBA).
# iOS 아이콘은 불투명해야 하므로 alpha를 제거하고 흰 배경으로 합성한다.
flutter_launcher_icons:
  image_path: "assets/images/oncare-logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
