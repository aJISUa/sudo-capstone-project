<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
    .title { font-size: 23px; font-weight: 700; fill: #111827; }
    .layer { font-size: 12.5px; font-weight: 700; fill: #6b7280; letter-spacing: 0.3px; }
    .node { font-size: 13.5px; font-weight: 600; fill: #111827; }
    .lbl { font-size: 12px; font-weight: 600; fill: #374151; }
  </style>
  <defs>
    <marker id="ar-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="ar-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="ar-y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
    <filter id="s2" x="-6%" y="-6%" width="112%" height="112%"><feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.10"/></filter>
  </defs>

  <rect width="960" height="580" fill="#ffffff"/>
  <text x="480" y="42" text-anchor="middle" class="title">System Architecture</text>

  <!-- Layer 1: Client -->
  <rect x="250" y="68" width="460" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="5,4"/>
  <text x="266" y="88" class="layer">FLUTTER 앱 (iOS &#183; Android)</text>
  <rect x="278" y="98" width="180" height="48" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s2)"/>
  <text x="368" y="127" text-anchor="middle" class="node">회원 모드</text>
  <rect x="502" y="98" width="180" height="48" rx="8" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5" filter="url(#s2)"/>
  <text x="592" y="127" text-anchor="middle" class="node">트레이너 모드</text>

  <!-- Client -> Backend -->
  <line x1="480" y1="160" x2="480" y2="222" stroke="#2563eb" stroke-width="2" marker-end="url(#ar-b)"/>
  <rect x="424" y="180" width="112" height="20" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="480" y="194" text-anchor="middle" class="lbl">HTTPS REST &#183; JWT</text>

  <!-- Layer 2: Backend -->
  <rect x="80" y="224" width="800" height="104" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.4" stroke-dasharray="5,4"/>
  <text x="96" y="244" class="layer">FASTAPI 백엔드</text>
  <rect x="112" y="256" width="216" height="56" rx="8" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5" filter="url(#s2)"/>
  <text x="220" y="290" text-anchor="middle" class="node">REST API &#183; JWT 인증</text>
  <rect x="372" y="256" width="216" height="56" rx="8" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5" filter="url(#s2)"/>
  <text x="480" y="290" text-anchor="middle" class="node">요약 리포트 생성</text>
  <rect x="632" y="256" width="216" height="56" rx="8" fill="#f0fdfa" stroke="#5eead4" stroke-width="1.5" filter="url(#s2)"/>
  <text x="740" y="290" text-anchor="middle" class="node">트레이너&#183;헬스장 매칭</text>

  <!-- Backend -> AI / Data / External -->
  <line x1="215" y1="328" x2="215" y2="392" stroke="#16a34a" stroke-width="2" marker-end="url(#ar-g)"/>
  <rect x="180" y="350" width="70" height="20" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="215" y="364" text-anchor="middle" class="lbl">인식&#183;분석</text>

  <line x1="475" y1="328" x2="475" y2="392" stroke="#16a34a" stroke-width="2" marker-end="url(#ar-g)"/>
  <rect x="442" y="350" width="66" height="20" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="475" y="364" text-anchor="middle" class="lbl">저장&#183;조회</text>

  <line x1="740" y1="328" x2="740" y2="392" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ar-y)"/>
  <rect x="718" y="350" width="44" height="20" rx="4" fill="#ffffff" opacity="0.96"/>
  <text x="740" y="364" text-anchor="middle" class="lbl">연동</text>

  <!-- Layer 3a: AI engine -->
  <rect x="80" y="392" width="270" height="150" rx="12" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.4" stroke-dasharray="5,4"/>
  <text x="96" y="412" class="layer">AI 엔진</text>
  <rect x="104" y="424" width="222" height="46" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.4" filter="url(#s2)"/>
  <text x="215" y="452" text-anchor="middle" class="node">식단 인식 (VLM)</text>
  <rect x="104" y="482" width="222" height="46" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.4" filter="url(#s2)"/>
  <text x="215" y="510" text-anchor="middle" class="node">공공 영양성분 DB 매칭</text>

  <!-- Layer 3b: Data -->
  <rect x="368" y="392" width="216" height="150" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.4" stroke-dasharray="5,4"/>
  <text x="384" y="412" class="layer">데이터</text>
  <path d="M410 448 a66 12 0 0 1 132 0 l0 52 a66 12 0 0 1 -132 0 Z" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <ellipse cx="476" cy="448" rx="66" ry="12" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="476" y="480" text-anchor="middle" class="node">PostgreSQL</text>
  <text x="476" y="500" text-anchor="middle" class="node" style="font-weight:400;fill:#6b7280">+ pgvector</text>

  <!-- Layer 3c: External -->
  <rect x="602" y="392" width="278" height="150" rx="12" fill="#fff7ed" stroke="#fdba74" stroke-width="1.4" stroke-dasharray="5,4"/>
  <text x="618" y="412" class="layer">외부 API</text>
  <rect x="624" y="424" width="234" height="32" rx="7" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="741" y="445" text-anchor="middle" class="node" style="font-size:12.5px">카카오맵 API</text>
  <rect x="624" y="463" width="234" height="32" rx="7" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="741" y="484" text-anchor="middle" class="node" style="font-size:12.5px">공공데이터포털 (식품영양성분)</text>
  <rect x="624" y="502" width="234" height="32" rx="7" fill="#ffffff" stroke="#d1d5db" stroke-width="1.3"/>
  <text x="741" y="523" text-anchor="middle" class="node" style="font-size:12.5px">Firebase Cloud Messaging</text>
</svg>
