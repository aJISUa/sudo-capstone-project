<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" width="960" height="760" role="img" aria-label="Vision AI 식단 인식 파이프라인">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="ar-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="960" height="760" fill="#ffffff"/>
  <text x="480" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Vision AI 식단 인식 파이프라인</text>
  <text x="480" y="72" text-anchor="middle" font-size="13" fill="#6b7280">사진 → Gemini Vision 인식 → 영양 DB 매핑 → 기록 저장</text>

  <rect x="330" y="105" width="300" height="64" rx="10" ry="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#soft)"/>
  <text x="480" y="133" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">사용자 식단 사진 업로드</text>
  <text x="480" y="151" text-anchor="middle" font-size="12" fill="#6b7280">JPEG / PNG · 모바일 카메라 또는 갤러리</text>

  <rect x="330" y="235" width="300" height="64" rx="10" ry="10" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#soft)"/>
  <text x="480" y="263" text-anchor="middle" font-size="15" font-weight="600" fill="#111827">1. Gemini Vision (VLM) — 음식 인식</text>
  <text x="480" y="281" text-anchor="middle" font-size="12" fill="#6b7280">오픈보캐블러리 · 다중 음식 동시 인식</text>

  <path d="M 330 378 a 150 10 0 0 0 300 0 V 436 a 150 10 0 0 1 -300 0 Z" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <ellipse cx="480" cy="378" rx="150" ry="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="480" y="405" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">2. 공공데이터 식품영양성분 DB 매핑</text>
  <text x="480" y="423" text-anchor="middle" font-size="12" fill="#6b7280">나트륨·당·칼로리 수치 교정 (환각 차단)</text>

  <path d="M 330 515 a 150 10 0 0 0 300 0 V 573 a 150 10 0 0 1 -300 0 Z" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <ellipse cx="480" cy="515" rx="150" ry="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="480" y="542" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">3. PostgreSQL — 식단 기록 저장</text>
  <text x="480" y="560" text-anchor="middle" font-size="12" fill="#6b7280">사용자별 일자/끼니 인덱싱</text>

  <rect x="120" y="650" width="720" height="64" rx="10" ry="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#soft)"/>
  <text x="480" y="678" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">결과: “닭볶음밥 1인분 · 450 kcal · 나트륨 980mg · 당 8g”</text>
  <text x="480" y="696" text-anchor="middle" font-size="12" fill="#6b7280">사용자에게 즉시 반환 및 일일 영양 요약에 반영</text>

  <line x1="480" y1="170" x2="480" y2="233" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <rect x="454" y="194" width="52" height="16" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="480" y="206" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">사진 입력</text>

  <line x1="480" y1="300" x2="480" y2="363" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <rect x="438" y="323" width="84" height="16" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="480" y="335" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">음식명 + 추정량</text>

  <line x1="480" y1="447" x2="480" y2="503" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <rect x="435" y="467" width="90" height="16" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="480" y="479" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">교정된 영양 수치</text>

  <line x1="480" y1="584" x2="480" y2="648" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
  <rect x="454" y="607" width="52" height="16" fill="#ffffff" opacity="0.95" rx="3"/>
  <text x="480" y="619" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">최종 출력</text>

  <g transform="translate(40, 735)">
    <line x1="0" y1="6" x2="28" y2="6" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ar-blue)"/>
    <text x="36" y="10" font-size="11" fill="#6b7280">메인 데이터 흐름 (Gemini 단독 + 영양 DB 하이브리드)</text>
  </g>
</svg>
