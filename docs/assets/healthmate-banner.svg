<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HealthMate AI banner">
  <defs>
    <linearGradient id="hm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#065F5B"/>
      <stop offset="0.5" stop-color="#0D9488"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="hm-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="hm-clip"><rect width="1200" height="320" rx="0"/></clipPath>
  </defs>

  <g clip-path="url(#hm-clip)">
    <rect width="1200" height="320" fill="url(#hm-bg)"/>

    <!-- decorative faint circles -->
    <circle cx="1105" cy="52" r="150" fill="#ffffff" opacity="0.05"/>
    <circle cx="980" cy="300" r="90" fill="#ffffff" opacity="0.05"/>
    <circle cx="120" cy="300" r="120" fill="#ffffff" opacity="0.04"/>

    <!-- subtle heartbeat line across background -->
    <path d="M-20 250 H360 L392 250 L412 206 L446 300 L470 232 L486 250 H1220"
          fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- logo tile (left) -->
    <g transform="translate(74,98)">
      <rect width="124" height="124" rx="30" fill="url(#hm-tile)"/>
      <path d="M18 66 H44 L52 66 L58 48 L69 90 L77 58 L83 66 H106"
            fill="none" stroke="#ffffff" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="18" cy="66" r="7.5" fill="#ffffff"/>
      <circle cx="106" cy="66" r="7.5" fill="#ffffff"/>
      <g fill="#ffffff" opacity="0.92">
        <rect x="58" y="24" width="8" height="24" rx="4"/>
        <rect x="50" y="32" width="24" height="8" rx="4"/>
      </g>
    </g>

    <!-- title -->
    <text x="246" y="150" font-family="'Inter','Pretendard','Apple SD Gothic Neo','Noto Sans KR','Segoe UI',sans-serif"
          font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-0.5">On-Care</text>

    <!-- subtitle -->
    <text x="248" y="192" font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Segoe UI',sans-serif"
          font-size="24" font-weight="500" fill="#CCFBF1">트레이너 연계 식단·운동 코칭 플랫폼</text>

    <!-- keyword pills -->
    <g font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Segoe UI',sans-serif" font-size="15" font-weight="600">
      <g transform="translate(248,214)">
        <rect width="196" height="34" rx="17" fill="#ffffff" fill-opacity="0.16"/>
        <text x="98" y="22" text-anchor="middle" fill="#ffffff">2030 고혈압·당뇨 위험군</text>
      </g>
      <g transform="translate(456,214)">
        <rect width="150" height="34" rx="17" fill="#ffffff" fill-opacity="0.16"/>
        <text x="75" y="22" text-anchor="middle" fill="#ffffff">불규칙한 생활 관리</text>
      </g>
      <g transform="translate(618,214)">
        <rect width="128" height="34" rx="17" fill="#ffffff" fill-opacity="0.16"/>
        <text x="64" y="22" text-anchor="middle" fill="#ffffff">AI 식단 인식</text>
      </g>
    </g>
  </g>
</svg>
