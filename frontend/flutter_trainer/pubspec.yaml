name: oncare_trainer
description: "On-Care 트레이너 앱 — 트레이너용 고객 관리 / AI 루틴 / 스케줄 (Android / iOS / Web)."
publish_to: 'none'

# Versioning is managed via --build-name / --build-number at build time.
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # --- State management & DI ---
  # 사용자 앱(frontend/flutter)과 동일한 Riverpod 기반. 트레이너 앱은
  # 별도 프로젝트이므로 코드는 공유하지 않고 스택만 맞춘다.
  flutter_riverpod: ^2.6.1

  # --- Routing ---
  go_router: ^14.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 런처/파비콘 아이콘을 온케어 로고에서 생성 (dart run flutter_launcher_icons).
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/

# 런처 아이콘 생성 설정 — 소스는 온케어 로고(500x500 RGBA).
# iOS 아이콘은 불투명해야 하므로 alpha를 제거하고 흰 배경으로 합성한다.
flutter_launcher_icons:
  image_path: "assets/images/oncare-logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
