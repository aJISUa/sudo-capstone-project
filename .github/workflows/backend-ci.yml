name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    name: Alembic + Pytest (Postgres/pgvector)
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: oncare
          POSTGRES_PASSWORD: oncare
          POSTGRES_DB: oncare
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oncare"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      ENV: dev
      DATABASE_URL: postgresql+psycopg://oncare:oncare@localhost:5432/oncare
      # AI 키는 필요 없음(테스트는 인식/코치 호출을 하지 않음)
      SEED_DEMO_DATA: "true"

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations (validates baseline)
        run: alembic upgrade head

      - name: Run tests
        run: pytest
